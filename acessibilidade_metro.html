<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Acesso - Linha 3 Vermelha</title>
    <style>
        :root {
            --red-line: #EE3E34;
            --bg-color: #121212;
            --card-bg: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-top: 5px solid var(--red-line);
        }
        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #2A2A2A;
            color: var(--text-main);
            font-size: 1rem;
            appearance: none;
        }
        select:focus {
            outline: none;
            border-color: var(--red-line);
        }
        .result-box {
            background-color: #2A2A2A;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-top: 10px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .result-door {
            font-size: 2rem;
            font-weight: bold;
            color: var(--red-line);
            margin: 10px 0;
        }
        .info-text {
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .alert {
            font-size: 0.8rem;
            color: #FFB74D;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Linha 3 - Elevadores</h1>
    
    <label for="origem">Onde você vai embarcar?</label>
    <select id="origem" onchange="calcularRota()">
        <option value="0" disabled selected>Selecione a origem</option>
    </select>

    <label for="destino">Onde você vai descer?</label>
    <select id="destino" onchange="calcularRota()">
        <option value="0" disabled selected>Selecione o destino</option>
    </select>

    <div class="result-box" id="resultado-box">
        <div class="info-text">Selecione origem e destino para ver a porta de embarque.</div>
    </div>
</div>

<script>
    // Base de dados com o mapeamento das portas dos elevadores
    const estacoes = {
        1: { nome: "Corinthians-Itaquera", elevadorBF: "Porta 11", elevadorIT: "-" },
        2: { nome: "Artur Alvim", elevadorBF: "Porta 65", elevadorIT: "Porta 64" },
        3: { nome: "Patriarca", elevadorBF: "Porta 18", elevadorIT: "Porta 11" },
        4: { nome: "Guilhermina-Esperança", elevadorBF: "Porta 17", elevadorIT: "Porta 12" },
        5: { nome: "Vila Matilde", elevadorBF: "Porta 66", elevadorIT: "Porta 64" },
        6: { nome: "Penha", elevadorBF: "Porta 18", elevadorIT: "Porta 11" },
        7: { nome: "Carrão", elevadorBF: "Porta 18", elevadorIT: "Porta 11" },
        8: { nome: "Tatuapé", elevadorBF: "Porta 66", elevadorIT: "Porta 63" },
        9: { nome: "Belém", elevadorBF: "Porta 65", elevadorIT: "Porta 63" },
        10: { nome: "Bresser-Mooca", elevadorBF: "Porta 65", elevadorIT: "Porta 63" },
        11: { nome: "Brás", elevadorBF: "Vagão 5, Porta 3", elevadorIT: "Vagão 2, Porta 2" },
        12: { nome: "Pedro II", elevadorBF: "Porta 32", elevadorIT: "Mapeamento pendente (Lateral IT)" },
        13: { nome: "Sé", elevadorBF: "Porta 25", elevadorIT: "Porta 33" },
        14: { nome: "Anhangabaú", elevadorBF: "Vagão 6, Porta 4", elevadorIT: "Vagão 1, Porta 1" },
        15: { nome: "República", elevadorBF: "Vagão 1, Porta 1", elevadorIT: "Vagão 6, Porta 4" },
        16: { nome: "Santa Cecília", elevadorBF: "Porta 44", elevadorIT: "Mapeamento pendente (Lateral IT)" },
        17: { nome: "Marechal Deodoro", elevadorBF: "Porta 37", elevadorIT: "Porta 37 (confirmar)" },
        18: { nome: "Barra Funda", elevadorBF: "-", elevadorIT: "Porta 44" }
    };

    // Preencher os selects
    const selectOrigem = document.getElementById('origem');
    const selectDestino = document.getElementById('destino');

    for (let id = 1; id <= 18; id++) {
        let optOrigem = document.createElement('option');
        optOrigem.value = id;
        optOrigem.text = estacoes[id].nome;
        selectOrigem.appendChild(optOrigem);

        let optDestino = document.createElement('option');
        optDestino.value = id;
        optDestino.text = estacoes[id].nome;
        selectDestino.appendChild(optDestino);
    }

    // Lógica de cálculo
    function calcularRota() {
        const idOrigem = parseInt(selectOrigem.value);
        const idDestino = parseInt(selectDestino.value);
        const box = document.getElementById('resultado-box');

        if (!idOrigem || !idDestino) return;

        if (idOrigem === idDestino) {
            box.innerHTML = `<div class="info-text">Origem e destino são a mesma estação.</div>`;
            return;
        }

        let sentido = "";
        let portaAlvo = "";

        if (idOrigem < idDestino) {
            sentido = "Barra Funda";
            portaAlvo = estacoes[idDestino].elevadorBF;
        } else {
            sentido = "Itaquera";
            portaAlvo = estacoes[idDestino].elevadorIT;
        }

        if (portaAlvo.includes("pendente")) {
            box.innerHTML = `
                <div class="info-text">Sentido: ${sentido}</div>
                <div class="result-door" style="font-size: 1.2rem; color: #FFB74D;">${portaAlvo}</div>
                <div class="info-text">Dados desta plataforma ainda não foram mapeados.</div>
            `;
            return;
        }

        box.innerHTML = `
            <div class="info-text">Na estação <b>${estacoes[idOrigem].nome}</b>,<br>embarque exatamente na:</div>
            <div class="result-door">${portaAlvo}</div>
            <div class="info-text">Você sairá de frente para o elevador em <b>${estacoes[idDestino].nome}</b>.</div>
            ${portaAlvo.includes("Vagão") ? '<div class="alert">*Estação sem portas de plataforma. Baseie-se no número do vagão.</div>' : ''}
        `;
    }
</script>

</body>
</html>
