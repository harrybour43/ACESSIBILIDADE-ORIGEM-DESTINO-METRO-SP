<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Acesso - Linha 3 Vermelha</title>
    <style>
        :root {
            --red-line: #EE3E34;
            --bg-color: #000000; /* Preto puro para maior contraste */
            --card-bg: #1A1A1A; /* Cinza escuro profundo */
            --text-main: #FFFFFF; /* Branco puro */
            --text-muted: #CCCCCC; /* Cinza claro bem legível */
            --border-color: #444444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 8px 16px rgba(0,0,0,0.8);
            border-top: 6px solid var(--red-line);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .lang-switch {
            font-size: 1.5rem;
            cursor: pointer;
            user-select: none;
        }
        .lang-switch span {
            margin-left: 5px;
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        .lang-switch span.active {
            opacity: 1;
        }
        h1 {
            font-size: 1.6rem;
            margin: 0;
            text-align: left;
            color: var(--text-main);
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
        }
        select {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 2px solid var(--border-color);
            background-color: #000000;
            color: var(--text-main);
            font-size: 1.05rem;
            appearance: none;
        }
        select:focus {
            outline: none;
            border-color: var(--red-line);
        }
        .result-box {
            background-color: #0A0A0A;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-top: 5px;
            border: 1px solid var(--border-color);
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .result-door {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--red-line);
            margin: 10px 0;
        }
        .info-text {
            font-size: 1rem;
            line-height: 1.5;
        }
        .alert {
            font-size: 0.9rem;
            color: #FFC107;
            margin-top: 15px;
            padding: 10px;
            background-color: rgba(255, 193, 7, 0.1);
            border-radius: 6px;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }
        .report-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background-color: transparent;
            color: var(--text-muted);
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            text-align: center;
            font-size: 0.9rem;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }
        .slogan {
            font-style: italic;
            margin-bottom: 8px;
            color: var(--text-main);
        }
        .signature {
            font-weight: bold;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }
    </style>
</head>

<div class="container">
    <div class="header-top">
        <h1 id="app-title">Rotas de Acesso<br><span style="color: #EE3E34; font-size: 1.2rem;">Linha 3 Vermelha</span></h1>
        <div class="lang-switch" onclick="toggleLanguage()">
            <span id="lang-pt" class="active">🇧🇷</span>
            <span id="lang-en">🇺🇸</span>
        </div>
    </div>
    
    <label for="preferencia" id="lbl-pref">Qual a sua preferência de saída?</label>
    <select id="preferencia" onchange="calcularRota()">

        <option value="rolante" id="opt-rolante">Escada Rolante</option>
        <option value="fixa" id="opt-fixa">Escada Fixa</option>
