<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Acesso - Linha 3 Vermelha</title>
    <style>
        :root {
            --red-line: #EE3E34;
            --bg-color: #000000;
            --card-bg: #1A1A1A;
            --text-main: #FFFFFF;
            --text-muted: #CCCCCC;
            --border-color: #444444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 8px 16px rgba(0,0,0,0.8);
            border-top: 6px solid var(--red-line);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .lang-switch {
            font-size: 1.5rem;
            cursor: pointer;
            user-select: none;
        }
        .lang-switch span {
            margin-left: 5px;
            opacity: 0.5;
            transition: opacity 0.3s;
        }
        .lang-switch span.active {
            opacity: 1;
        }
        h1 {
            font-size: 1.6rem;
            margin: 0;
            text-align: left;
            color: var(--text-main);
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
        }
        select {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 2px solid var(--border-color);
            background-color: #000000;
            color: var(--text-main);
            font-size: 1.05rem;
            appearance: none;
        }
        select:focus {
            outline: none;
            border-color: var(--red-line);
        }
        .result-box {
            background-color: #0A0A0A;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-top: 5px;
            border: 1px solid var(--border-color);
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .result-door {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--red-line);
            margin: 10px 0;
        }
        .info-extra {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: -5px;
            margin-bottom: 15px;
        }
        .info-text {
            font-size: 1rem;
            line-height: 1.5;
        }
        .alert {
            font-size: 0.9rem;
            color: #FFC107;
            margin-top: 15px;
            padding: 10px;
            background-color: rgba(255, 193, 7, 0.1);
            border-radius: 6px;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }
        .report-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background-color: transparent;
            color: var(--text-muted);
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            text-align: center;
            font-size: 0.9rem;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }
        .slogan {
            font-style: italic;
            margin-bottom: 8px;
            color: var(--text-main);
        }
        .signature {
            font-weight: bold;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-top">
        <h1 id="app-title">Rotas de Acesso<br><span style="color: #EE3E34; font-size: 1.2rem;">Linha 3 Vermelha</span></h1>
        <div class="lang-switch" onclick="toggleLanguage()">
            <span id="lang-pt" class="active">🇧🇷</span>
            <span id="lang-en">🇺🇸</span>
        </div>
    </div>
    
    <label for="preferencia" id="lbl-pref">Qual a sua preferência de saída?</label>
    <select id="preferencia" onchange="calcularRota()">
        <option value="elevador" id="opt-elevador" selected>Elevador</option>
        <option value="rolante" id="opt-rolante">Escada Rolante</option>
        <option value="fixa" id="opt-fixa">Escada Fixa</option>
    </select>

    <label for="origem" id="lbl-origem">Onde você vai embarcar?</label>
    <select id="origem" onchange="calcularRota()"></select>

    <label for="destino" id="lbl-destino">Onde você vai descer?</label>
    <select id="destino" onchange="calcularRota()"></select>

    <div class="result-box" id="resultado-box">
        <div class="info-text" id="initial-msg">Selecione as estações para ver a porta de embarque.</div>
    </div>

    <button class="report-btn" id="btn-report">⚠️ Reportar alteração (Em breve)</button>

    <div class="footer">
        <div class="slogan" id="slogan-text">"Autonomia. Precisão no embarque. Distâncias menores."</div>
        <div class="signature">Idealizado por: Harry Bour | 2026</div>
    </div>
</div>

<script>
    let currentLang = 'pt';

    const dicionario = {
        'pt': {
            title: 'Rotas de Acesso<br><span style="color: #EE3E34; font-size: 1.2rem;">Linha 3 Vermelha</span>',
            lblPref: 'Qual a sua preferência de saída?',
            optElevador: 'Elevador',
            optRolante: 'Escada Rolante',
            optFixa: 'Escada Fixa',
            lblOrigem: 'Onde você vai embarcar?',
            lblDestino: 'Onde você vai descer?',
            optDefaultOrigem: 'Selecione a origem',
            optDefaultDestino: 'Selecione o destino',
            initialMsg: 'Selecione as estações para ver a porta de embarque.',
            btnReport: '⚠️ Reportar alteração (Em breve)',
            slogan: '"Autonomia em cada embarque. O direito à cidade sem barreiras."',
            mesmaEstacao: 'Origem e destino são a mesma estação.',
            embarqueNa: 'Na estação <b>{origem}</b>,<br>embarque exatamente na:',
            saidaFrente: 'Você sairá de frente para a <b>{tipo}</b> em <b>{destino}</b>.',
            tipoElevador: 'porta do elevador',
            tipoRolante: 'escada rolante',
            tipoFixa: 'escada fixa',
            avisoVagao: '*Estação sem portas na plataforma. Baseie-se pelo número do vagão.',
            faltaRolante: 'Opção indisponível nesta estação.',
            sugestaoElevador: 'Sugerimos utilizar o <b>Elevador</b> na:',
            pendente: 'Dado pendente de mapeamento.',
            equivalente: '(Equivalente à Porta {num})'
        },
        'en': {
            title: 'Access Routes<br><span style="color: #EE3E34; font-size: 1.2rem;">Red Line 3</span>',
            lblPref: 'What is your exit preference?',
            optElevador: 'Elevator',
            optRolante: 'Escalator',
            optFixa: 'Stairs',
            lblOrigem: 'Where will you board?',
            lblDestino: 'Where will you get off?',
            optDefaultOrigem: 'Select origin',
            optDefaultDestino: 'Select destination',
            initialMsg: 'Select stations to see the boarding door.',
            btnReport: '⚠️ Report change (Coming soon)',
            slogan: '"Autonomy. Boarding precision. Shorter distances."',
            mesmaEstacao: 'Origin and destination are the same.',
            embarqueNa: 'At <b>{origem}</b> station,<br>board exactly at:',
            saidaFrente: 'You will exit facing the <b>{tipo}</b> at <b>{destino}</b>.',
            tipoElevador: 'elevator door',
            tipoRolante: 'escalator',
            tipoFixa: 'stairs',
            avisoVagao: '*Station without platform doors. Board using the car number.',
            faltaRolante: 'Option unavailable at this station.',
            sugestaoElevador: 'We suggest using the <b>Elevator</b> at:',
            pendente: 'Data pending mapping.',
            equivalente: '(Equivalent to Door {num})'
        }
    };

    const mapaPortas = {
        "BF": {
            "18": "Vagão 1, Porta 1", "17": "Vagão 1, Porta 2", "16": "Vagão 1, Porta 3", "15": "Vagão 1, Porta 4",
            "28": "Vagão 2, Porta 1", "27": "Vagão 2, Porta 2", "26": "Vagão 2, Porta 3", "25": "Vagão 2, Porta 4",
            "38": "Vagão 3, Porta 1", "37": "Vagão 3, Porta 2", "36": "Vagão 3, Porta 3", "35": "Vagão 3, Porta 4",
            "48": "Vagão 4, Porta 1", "47": "Vagão 4, Porta 2", "46": "Vagão 4, Porta 3", "45": "Vagão 4, Porta 4",
            "58": "Vagão 5, Porta 1", "57": "Vagão 5, Porta 2", "56": "Vagão 5, Porta 3", "55": "Vagão 5, Porta 4",
            "68": "Vagão 6, Porta 1", "67": "Vagão 6, Porta 2", "66": "Vagão 6, Porta 3", "65": "Vagão 6, Porta 4"
        },
        "IT": {
            "11": "Vagão 6, Porta 4", "12": "Vagão 6, Porta 3", "13": "Vagão 6, Porta 2", "14": "Vagão 6, Porta 1",
            "21": "Vagão 5, Porta 4", "22": "Vagão 5, Porta 3", "23": "Vagão 5, Porta 2", "24": "Vagão 5, Porta 1",
            "31": "Vagão 4, Porta 4", "32": "Vagão 4, Porta 3", "33": "Vagão 4, Porta 2", "34": "Vagão 4, Porta 1",
            "41": "Vagão 3, Porta 4", "42": "Vagão 3, Porta 3", "43": "Vagão 3, Porta 2", "44": "Vagão 3, Porta 1",
            "51": "Vagão 2, Porta 4", "52": "Vagão 2, Porta 3", "53": "Vagão 2, Porta 2", "54": "Vagão 2, Porta 1",
            "61": "Vagão 1, Porta 4", "62": "Vagão 1, Porta 3", "63": "Vagão 1, Porta 2", "64": "Vagão 1, Porta 1"
        }
    };

    // Estações com a nova tag semPortas
    const estacoes = {
        1: { nome: "Corinthians-Itaquera", elevadorBF: "Porta 11", elevadorIT: "-", rolanteBF: "Porta 21", rolanteIT: "-", fixaBF: "Porta 31", fixaIT: "-" },
        2: { nome: "Artur Alvim", elevadorBF: "Porta 65", elevadorIT: "Porta 64", rolanteBF: "Porta 47", rolanteIT: "Porta 43", fixaBF: "Porta 25", fixaIT: "Porta 24" },
        3: { nome: "Patriarca", elevadorBF: "Porta 18", elevadorIT: "Porta 11", rolanteBF: "Porta 35", rolanteIT: "Porta 34", fixaBF: "Porta 45", fixaIT: "Porta 44" },
        4: { nome: "Guilhermina-Esperança", elevadorBF: "Porta 17", elevadorIT: "Porta 12", rolanteBF: "Porta 36", rolanteIT: "Porta 33", fixaBF: "Porta 58", fixaIT: "Porta 51" },
        5: { nome: "Vila Matilde", elevadorBF: "Porta 66", elevadorIT: "Porta 64", rolanteBF: "Porta 47", rolanteIT: "Porta 42", fixaBF: "Porta 25", fixaIT: "Porta 24" },
        6: { nome: "Penha", elevadorBF: "Porta 18", elevadorIT: "Porta 11", rolanteBF: "Porta 36", rolanteIT: "Porta 33", fixaBF: "Porta 47", fixaIT: "Porta 42" },
        7: { nome: "Carrão", elevadorBF: "Porta 18", elevadorIT: "Porta 11", rolanteBF: "Porta 36", rolanteIT: "Porta 33", fixaBF: "Porta 58", fixaIT: "Porta 51" },
        8: { nome: "Tatuapé", elevadorBF: "Porta 66", elevadorIT: "Porta 63", rolanteBF: "Porta 35", rolanteIT: "Porta 34", fixaBF: "Porta 45", fixaIT: "Porta 44" },
        9: { nome: "Belém", elevadorBF: "Porta 65", elevadorIT: "Porta 63", rolanteBF: "Porta 47", rolanteIT: "Porta 42", fixaBF: "Porta 37", fixaIT: "Porta 32" },
        10: { nome: "Bresser-Mooca", elevadorBF: "Porta 65", elevadorIT: "Porta 63", rolanteBF: "Porta 47", rolanteIT: "Porta 42", fixaBF: "Porta 37", fixaIT: "Porta 32" },
        11: { nome: "Brás", semPortas: true, elevadorBF: "Vagão 5, Porta 3", elevadorIT: "Vagão 2, Porta 2", rolanteBF: "Vagão 6, Porta 3", rolanteIT: "Vagão 1, Porta 2", fixaBF: "Vagão 4, Porta 1", fixaIT: "Vagão 3, Porta 4" },
        12: { nome: "Pedro II", elevadorBF: "Porta 32", elevadorIT: "Pendente", rolanteBF: "Porta 14", rolanteIT: "Pendente", fixaBF: "Porta 61", fixaIT: "Pendente" },
        13: { nome: "Sé", elevadorBF: "Porta 25", elevadorIT: "Porta 33", rolanteBF: "Porta 57", rolanteIT: "Porta 52", fixaBF: "Porta 57", fixaIT: "Porta 52" },
        14: { nome: "Anhangabaú", semPortas: true, elevadorBF: "Vagão 6, Porta 4", elevadorIT: "Vagão 1, Porta 1", rolanteBF: "Vagão 1, Porta 1", rolanteIT: "Vagão 6, Porta 6", fixaBF: "Vagão 1, Porta 1", fixaIT: "Vagão 6, Porta 6" },
        15: { nome: "República", semPortas: true, elevadorBF: "Vagão 1, Porta 1", elevadorIT: "Vagão 6, Porta 4", rolanteBF: "Vagão 6, Porta 1", rolanteIT: "Vagão 1, Porta 4", fixaBF: "Vagão 6, Porta 4", fixaIT: "Vagão 1, Porta 1" },
        16: { nome: "Santa Cecília", elevadorBF: "Porta 44", elevadorIT: "Pendente", rolanteBF: "Sem rolante mapeada", rolanteIT: "Pendente", fixaBF: "Porta 33", fixaIT: "Pendente" },
        17: { nome: "Marechal Deodoro", elevadorBF: "Porta 37", elevadorIT: "Porta 37", rolanteBF: "Porta 36", rolanteIT: "Porta 36", fixaBF: "Porta 36", fixaIT: "Porta 36" },
        18: { nome: "Barra Funda", elevadorBF: "-", elevadorIT: "Porta 44", rolanteBF: "-", rolanteIT: "Porta 34", fixaBF: "-", fixaIT: "Porta 61" }
    };

    function carregarEstacoes() {
        const selectOrigem = document.getElementById('origem');
        const selectDestino = document.getElementById('destino');
        
        selectOrigem.options.length = 0;
        selectDestino.options.length = 0;

        let defaultOrigem = document.createElement("option");
        defaultOrigem.text = dicionario[currentLang].optDefaultOrigem;
        defaultOrigem.value = "0";
        defaultOrigem.disabled = true;
        defaultOrigem.selected = true;
        selectOrigem.add(defaultOrigem);

        let defaultDestino = document.createElement("option");
        defaultDestino.text = dicionario[currentLang].optDefaultDestino;
        defaultDestino.value = "0";
        defaultDestino.disabled = true;
        defaultDestino.selected = true;
        selectDestino.add(defaultDestino);

        for (let id = 1; id <= 18; id++) {
            selectOrigem.add(new Option(estacoes[id].nome, id));
            selectDestino.add(new Option(estacoes[id].nome, id));
        }
    }

    function toggleLanguage() {
        currentLang = currentLang === 'pt' ? 'en' : 'pt';
        
        document.getElementById('lang-pt').classList.toggle('active', currentLang === 'pt');
        document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');

        document.getElementById('app-title').innerHTML = dicionario[currentLang].title;
        document.getElementById('lbl-pref').innerText = dicionario[currentLang].lblPref;
        document.getElementById('opt-elevador').innerText = dicionario[currentLang].optElevador;
        document.getElementById('opt-rolante').innerText = dicionario[currentLang].optRolante;
        document.getElementById('opt-fixa').innerText = dicionario[currentLang].optFixa;
        document.getElementById('lbl-origem').innerText = dicionario[currentLang].lblOrigem;
        document.getElementById('lbl-destino').innerText = dicionario[currentLang].lblDestino;
        document.getElementById('btn-report').innerText = dicionario[currentLang].btnReport;
        document.getElementById('slogan-text').innerText = dicionario[currentLang].slogan;

        const origemVal = document.getElementById('origem').value;
        const destinoVal = document.getElementById('destino').value;
        
        carregarEstacoes();
        
        document.getElementById('origem').value = origemVal;
        document.getElementById('destino').value = destinoVal;
        
        if(origemVal != 0 && destinoVal != 0) {
            calcularRota();
        } else {
            document.getElementById('resultado-box').innerHTML = `<div class="info-text" id="initial-msg">${dicionario[currentLang].initialMsg}</div>`;
        }
    }

    function obterInfoExtra(alvo, sentido) {
        let t = dicionario[currentLang];
        let info = "";
        let vagaoMatch = alvo.match(/Vagão \d, Porta \d/);
        let numMatch = alvo.match(/\d{2}/);

        if (vagaoMatch) {
            let vStr = vagaoMatch[0];
            let numEq = null;
            for (let k in mapaPortas[sentido]) {
                if (mapaPortas[sentido][k] === vStr) { numEq = k; break; }
            }
            if (numEq) info = t.equivalente.replace('{num}', numEq);
        } else if (numMatch && !alvo.includes("Vagão")) {
            let num = numMatch[0];
            if (mapaPortas[sentido][num]) {
                info = `(${traduzirPorta(mapaPortas[sentido][num])})`;
            }
        }
        return info;
    }

    function traduzirPorta(texto) {
        if (currentLang === 'en') {
            return texto.replace(/Porta/g, 'Door').replace(/Vagão/g, 'Car');
        }
        return texto;
    }

    function calcularRota() {
        const idOrigem = parseInt(document.getElementById('origem').value);
        const idDestino = parseInt(document.getElementById('destino').value);
        const preferencia = document.getElementById('preferencia').value;
        const box = document.getElementById('resultado-box');
        const t = dicionario[currentLang];

        if (!idOrigem || !idDestino) return;

        if (idOrigem === idDestino) {
            box.innerHTML = `<div class="info-text">${t.mesmaEstacao}</div>`;
            return;
        }

        let sentido = idOrigem < idDestino ? "BF" : "IT";
        let portaAlvo = "";
        let portaAlternativaElevador = "";

        if (preferencia === "elevador") {
            portaAlvo = sentido === "BF" ? estacoes[idDestino].elevadorBF : estacoes[idDestino].elevadorIT;
        } else if (preferencia === "rolante") {
            portaAlvo = sentido === "BF" ? estacoes[idDestino].rolanteBF : estacoes[idDestino].rolanteIT;
            portaAlternativaElevador = sentido === "BF" ? estacoes[idDestino].elevadorBF : estacoes[idDestino].elevadorIT;
        } else {
            portaAlvo = sentido === "BF" ? estacoes[idDestino].fixaBF : estacoes[idDestino].fixaIT;
        }

        if (portaAlvo.includes("Pendente") || portaAlvo === "-") {
            box.innerHTML = `
                <div class="info-text">${t.pendente}</div>
                <div class="result-door" style="font-size: 1.2rem; color: #FFB74D;">${portaAlvo === "-" ? "N/A" : portaAlvo}</div>
            `;
            return;
        }

        // Verifica se a origem não tem portas (agora olha para a origem, não para o destino!)
        let avisoVagaoNaOrigem = estacoes[idOrigem].semPortas ? `<div class="alert">${t.avisoVagao}</div>` : '';

        if (portaAlvo.includes("Sem rolante")) {
            let displayAlternativa = traduzirPorta(portaAlternativaElevador);
            let infoExtraAlt = obterInfoExtra(portaAlternativaElevador, sentido);

            box.innerHTML = `
                <div class="info-text" style="color: #FFB74D; margin-bottom: 10px;">⚠️ ${t.faltaRolante}</div>
                <div class="info-text">${t.sugestaoElevador}</div>
                <div class="result-door">${displayAlternativa}</div>
                ${infoExtraAlt ? `<div class="info-extra">${infoExtraAlt}</div>` : ''}
                <div class="info-text">${t.saidaFrente.replace('{tipo}', t.tipoElevador).replace('{destino}', estacoes[idDestino].nome)}</div>
                ${avisoVagaoNaOrigem}
            `;
            return;
        }

        let tipoSaidaTexto = preferencia === 'elevador' ? t.tipoElevador : (preferencia === 'rolante' ? t.tipoRolante : t.tipoFixa);
        let textoEmbarque = t.embarqueNa.replace('{origem}', estacoes[idOrigem].nome);
        let textoSaida = t.saidaFrente.replace('{tipo}', tipoSaidaTexto).replace('{destino}', estacoes[idDestino].nome);

        let displayPorta = traduzirPorta(portaAlvo);
        let infoExtra = obterInfoExtra(portaAlvo, sentido);

        box.innerHTML = `
            <div class="info-text">${textoEmbarque}</div>
            <div class="result-door">${displayPorta}</div>
            ${infoExtra ? `<div class="info-extra">${infoExtra}</div>` : ''}
            <div class="info-text">${textoSaida}</div>
            ${avisoVagaoNaOrigem}
        `;
    }

    carregarEstacoes();
</script>

</body>
</html>
