<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PORTA CERTA SP - Guia de Acesso</title>
    <style>
        :root {
            --red-line: #EE3E34;
            --blue-line: #00539B;
            --bg-color: #000000;
            --card-bg: #1A1A1A;
            --text-main: #FFFFFF;
            --text-muted: #CCCCCC;
            --border-color: #444444;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            transition: all 0.3s ease;
        }
        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 8px 16px rgba(0,0,0,0.8);
            border-top: 6px solid var(--red-line);
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
        }
        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .a11y-btn {
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text-main);
            background: #333;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 4px 10px;
            cursor: pointer;
            user-select: none;
        }
        .lang-switch {
            font-size: 1.5rem;
            cursor: pointer;
            user-select: none;
            display: flex;
            gap: 5px;
        }
        .lang-switch span {
            opacity: 0.4;
            transition: opacity 0.3s;
        }
        .lang-switch span.active {
            opacity: 1;
        }
        h1 {
            font-size: 1.8rem;
            margin: 0;
            text-align: left;
            color: var(--text-main);
            line-height: 1.2;
        }
        .subtitle {
            color: var(--text-main);
            font-size: 1.1rem;
            display: block;
            margin-top: 4px;
        }
        .dot-red { color: var(--red-line); font-weight: bold; }
        .dot-blue { color: var(--blue-line); font-weight: bold; }
        
        .tutorial-text {
            font-size: 0.95rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px dashed var(--border-color);
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            color: var(--text-muted);
        }
        select {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 2px solid var(--border-color);
            background-color: #000000;
            color: var(--text-main);
            font-size: 1.05rem;
            appearance: none;
        }
        select:focus {
            outline: none;
            border-color: var(--red-line);
        }
        optgroup {
            background-color: #1A1A1A;
            color: var(--text-muted);
            font-style: normal;
            font-weight: bold;
        }
        option {
            background-color: #000;
            color: #FFF;
        }
        .result-box {
            background-color: #0A0A0A;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-top: 5px;
            border: 1px solid var(--border-color);
            min-height: 140px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .result-door {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--red-line);
            margin: 10px 0;
        }
        .door-blue {
            color: var(--blue-line);
        }
        .info-extra {
            color: var(--text-muted);
            font-size: 1.1rem;
            font-weight: 600;
            margin-top: -5px;
            margin-bottom: 15px;
        }
        .info-text {
            font-size: 1rem;
            line-height: 1.5;
        }
        .alert {
            font-size: 0.9rem;
            color: #FFC107;
            margin-top: 15px;
            padding: 10px;
            background-color: rgba(255, 193, 7, 0.1);
            border-radius: 6px;
            border: 1px solid rgba(255, 193, 7, 0.3);
        }
        .alert-blue {
            color: #64B5F6;
            border-color: rgba(100, 181, 246, 0.3);
            background-color: rgba(100, 181, 246, 0.1);
        }
        .report-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background-color: transparent;
            color: var(--text-muted);
            border: 1px dashed var(--border-color);
            border-radius: 6px;
            text-align: center;
            font-size: 0.9rem;
            cursor: not-allowed;
            opacity: 0.7;
        }
        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-muted);
            border-top: 1px solid var(--border-color);
            padding-top: 15px;
        }
        .slogan {
            font-style: italic;
            margin-bottom: 8px;
            color: var(--text-main);
        }
        .signature {
            font-weight: bold;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        /* ACESSIBILIDADE VISUAL */
        body.large-font h1 { font-size: 2.2rem; }
        body.large-font .subtitle { font-size: 1.3rem; }
        body.large-font .tutorial-text { font-size: 1.15rem; }
        body.large-font label { font-size: 1.15rem; color: #FFF; }
        body.large-font select { font-size: 1.25rem; padding: 16px; }
        body.large-font .result-door { font-size: 2.8rem; }
        body.large-font .info-text { font-size: 1.2rem; }
        body.large-font .info-extra { font-size: 1.3rem; }
        body.large-font .alert { font-size: 1.05rem; }
        body.large-font .slogan { font-size: 1rem; }
    </style>
</head>

    function carregarEstacoes() {
        const selectOrigem = document.getElementById('origem');
        const selectDestino = document.getElementById('destino');
        const t = dicionario[currentLang];
        
        selectOrigem.options.length = 0;
        selectDestino.options.length = 0;

        selectOrigem.add(new Option(t.optDefaultOrigem, "0", true, true));
        selectOrigem.options[0].disabled = true;
        
        selectDestino.add(new Option(t.optDefaultDestino, "0", true, true));
        selectDestino.options[0].disabled = true;

        let grupoOrigemL3 = document.createElement("optgroup");
        grupoOrigemL3.label = t.grupoL3;
        let grupoOrigemL1 = document.createElement("optgroup");
        grupoOrigemL1.label = t.grupoL1;

        let grupoDestinoL3 = document.createElement("optgroup");
        grupoDestinoL3.label = t.grupoL3;
        let grupoDestinoL1 = document.createElement("optgroup");
        grupoDestinoL1.label = t.grupoL1;

        for (let id in estacoes) {
            let opt1 = new Option(estacoes[id].nome, id);
            let opt2 = new Option(estacoes[id].nome, id);
            
            if (estacoes[id].linha === 3) {
                grupoOrigemL3.appendChild(opt1);
                grupoDestinoL3.appendChild(opt2);
            } else {
                grupoOrigemL1.appendChild(opt1);
                grupoDestinoL1.appendChild(opt2);
            }
        }

        selectOrigem.appendChild(grupoOrigemL3);
        selectOrigem.appendChild(grupoOrigemL1);
        selectDestino.appendChild(grupoDestinoL3);
        selectDestino.appendChild(grupoDestinoL1);
    }

    function toggleFontSize() {
        isLargeFont = !isLargeFont;
        if (isLargeFont) {
            document.body.classList.add('large-font');
            document.getElementById('btn-font').innerText = 'A-';
        } else {
            document.body.classList.remove('large-font');
            document.getElementById('btn-font').innerText = 'A+';
        }
    }

    function toggleLanguage() {
        currentLang = currentLang === 'pt' ? 'en' : 'pt';
        
        document.getElementById('lang-pt').classList.toggle('active', currentLang === 'pt');
        document.getElementById('lang-en').classList.toggle('active', currentLang === 'en');

        document.getElementById('app-title').innerHTML = dicionario[currentLang].title;
        document.getElementById('tutorial-text').innerText = dicionario[currentLang].tutorial;
        document.getElementById('lbl-pref').innerText = dicionario[currentLang].lblPref;
        document.getElementById('opt-elevador').innerText = dicionario[currentLang].optElevador;
        document.getElementById('opt-rolante').innerText = dicionario[currentLang].optRolante;
        document.getElementById('opt-fixa').innerText = dicionario[currentLang].optFixa;
        document.getElementById('lbl-origem').innerText = dicionario[currentLang].lblOrigem;
        document.getElementById('lbl-destino').innerText = dicionario[currentLang].lblDestino;
        document.getElementById('btn-report').innerText = dicionario[currentLang].btnReport;
        document.getElementById('slogan-text').innerText = dicionario[currentLang].slogan;

        const origemVal = document.getElementById('origem').value;
        const destinoVal = document.getElementById('destino').value;
        
        carregarEstacoes();
        
        document.getElementById('origem').value = origemVal;
        document.getElementById('destino').value = destinoVal;
        
        if(origemVal != 0 && destinoVal != 0) {
            calcularRota();
        } else {
            document.getElementById('resultado-box').innerHTML = `<div class="info-text" id="initial-msg">${dicionario[currentLang].initialMsg}</div>`;
        }
    }

        let numMatch = alvo.match(/\d{2}/);

        if (vagaoMatch) {
            let vStr = vagaoMatch[0];
            let numEq = null;
            for (let k in mapaPortas[sentido]) {
                if (mapaPortas[sentido][k] === vStr) { numEq = k; break; }
            }
            if (numEq) info = t.equivalente.replace('{num}', numEq);
        } else if (numMatch && !alvo.includes("Vagão")) {
            let num = numMatch[0];
            if (mapaPortas[sentido][num]) {
                info = `(${traduzirPorta(mapaPortas[sentido][num])})`;
            }
        }
        return info;
    }

    function traduzirPorta(texto) {
        if (currentLang === 'en') {
            return texto.replace(/Porta/g, 'Door').replace(/Vagão/g, 'Car');
        }
        return texto;
    }

    function calcularRota() {
        const idOrigem = parseInt(document.getElementById('origem').value);
        const idDestino = parseInt(document.getElementById('destino').value);
        const preferencia = document.getElementById('preferencia').value;
        const box = document.getElementById('resultado-box');
        const t = dicionario[currentLang];

        if (!idOrigem || !idDestino) return;

        if (idOrigem === idDestino || (estacoes[idOrigem].nome === "Sé" && estacoes[idDestino].nome === "Sé")) {
            box.innerHTML = `<div class="info-text">${t.mesmaEstacao}</div>`;
            return;
        }

        let origem = estacoes[idOrigem];
        let destino = estacoes[idDestino];

        // Lógica para estações ainda em mapeamento (Linha 1)
        if (origem.linha === 1 && destino.linha === 1) {
            box.innerHTML = `<div class="alert alert-blue" style="text-align: center;">ℹ️ ${t.emMapeamentoL1}</div>`;
            return;
        }

        // Lógica de BALDEAÇÃO L3 -> L1
        if (origem.linha === 3 && destino.linha === 1) {
            let sentidoL3 = idOrigem < 13 ? "BF" : "IT"; // 13 é a Sé na L3
            let sentidoL1 = idDestino < 111 ? "Tucuruvi" : "Jabaquara"; // 111 é a Sé na L1
            
            let portaAlvo = "";
            // Portas mapeadas de transferência na Sé
            if (sentidoL1 === "Tucuruvi") {
                portaAlvo = sentidoL3 === "BF" ? "Porta 57" : "Porta 52";
            } else {
                portaAlvo = sentidoL3 === "BF" ? "Porta 15" : "Porta 13";
            }

            let displayPorta = traduzirPorta(portaAlvo);
            let infoExtra = obterInfoExtra(portaAlvo, sentidoL3);
            let textoEmbarque = t.embarqueNa.replace('{origem}', origem.nome);
            let textoSaidaBaldeacao = t.saidaBaldeacao.replace('{sentido}', sentidoL1);
            let avisoVagaoNaOrigem = origem.semPortas ? `<div class="alert">${t.avisoVagao}</div>` : '';

            box.innerHTML = `
                <div class="info-text">${textoEmbarque}</div>
                <div class="result-door door-blue">${displayPorta}</div>
                ${infoExtra ? `<div class="info-extra">${infoExtra}</div>` : ''}
                <div class="info-text">${textoSaidaBaldeacao}</div>
                ${avisoVagaoNaOrigem}
                <div class="alert alert-blue" style="margin-top: 20px;">ℹ️ ${t.emMapeamentoL1}</div>
            `;
            return;
        }

        // Lógica de BALDEAÇÃO L1 -> L3
        if (origem.linha === 1 && destino.linha === 3) {
            box.innerHTML = `
                <div class="alert alert-blue" style="text-align: center; margin-bottom: 15px;">ℹ️ ${t.emMapeamentoL1}</div>
                <div class="info-text">Vá até a estação Sé e faça a transferência para a <b>Linha 3 - Vermelha</b>.</div>
            `;
            return;
        }

        // FLUXO NORMAL L3 -> L3
        let sentido = idOrigem < idDestino ? "BF" : "IT";
        let portaAlvo = "";
        let portaAlternativaElevador = "";

        if (preferencia === "elevador") {
            portaAlvo = sentido === "BF" ? destino.elevadorBF : destino.elevadorIT;
        } else if (preferencia === "rolante") {
            portaAlvo = sentido === "BF" ? destino.rolanteBF : destino.rolanteIT;
            portaAlternativaElevador = sentido === "BF" ? destino.elevadorBF : destino.elevadorIT;
        } else {
            portaAlvo = sentido === "BF" ? destino.fixaBF : destino.fixaIT;
        }

        if (portaAlvo.includes("Pendente") || portaAlvo === "-") {
            box.innerHTML = `
                <div class="info-text">${t.pendente}</div>
                <div class="result-door" style="font-size: 1.2rem; color: #FFB74D;">${portaAlvo === "-" ? "N/A" : portaAlvo}</div>
            `;
            return;
        }

        let avisoVagaoNaOrigem = origem.semPortas ? `<div class="alert">${t.avisoVagao}</div>` : '';

        if (portaAlvo.includes("Sem rolante")) {
            let displayAlternativa = traduzirPorta(portaAlternativaElevador);
            let infoExtraAlt = obterInfoExtra(portaAlternativaElevador, sentido);

            box.innerHTML = `
                <div class="info-text" style="color: #FFB74D; margin-bottom: 10px;">⚠️ ${t.faltaRolante}</div>
                <div class="info-text">${t.sugestaoElevador}</div>
                <div class="result-door">${displayAlternativa}</div>
                ${infoExtraAlt ? `<div class="info-extra">${infoExtraAlt}</div>` : ''}
                <div class="info-text">${t.saidaFrente.replace('{tipo}', t.tipoElevador).replace('{destino}', destino.nome)}</div>
                ${avisoVagaoNaOrigem}
            `;
            return;
        }

        let tipoSaidaTexto = preferencia === 'elevador' ? t.tipoElevador : (preferencia === 'rolante' ? t.tipoRolante : t.tipoFixa);
        let textoEmbarque = t.embarqueNa.replace('{origem}', origem.nome);
        let textoSaida = t.saidaFrente.replace('{tipo}', tipoSaidaTexto).replace('{destino}', destino.nome);

        let displayPorta = traduzirPorta(portaAlvo);
        let infoExtra = obterInfoExtra(portaAlvo, sentido);

        box.innerHTML = `
            <div class="info-text">${textoEmbarque}</div>
            <div class="result-door">${displayPorta}</div>
            ${infoExtra ? `<div class="info-extra">${infoExtra}</div>` : ''}
            <div class="info-text">${textoSaida}</div>
            ${avisoVagaoNaOrigem}
        `;
    }

    carregarEstacoes();
</script>
