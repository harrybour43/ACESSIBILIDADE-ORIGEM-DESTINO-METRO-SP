<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia de Acesso - Linha 3 Vermelha</title>
    <style>
        :root {
            --red-line: #EE3E34;
            --bg-color: #121212;
            --card-bg: #1E1E1E;
            --text-main: #FFFFFF;
            --text-muted: #A0A0A0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border-top: 5px solid var(--red-line);
        }
        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 6px;
            border: 1px solid #333;
            background-color: #2A2A2A;
            color: var(--text-main);
            font-size: 1rem;
            appearance: none;
        }
        select:focus {
            outline: none;
            border-color: var(--red-line);
        }
        .result-box {
            background-color: #2A2A2A;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            margin-top: 10px;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .result-door {
            font-size: 2rem;
            font-weight: bold;
            color: var(--red-line);
            margin: 10px 0;
        }
        .info-text {
            font-size: 0.9rem;
            line-height: 1.4;
        }
        .alert {
            font-size: 0.8rem;
            color: #FFB74D;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Rotas de Acesso - Linha 3</h1>
    
    <label for="preferencia">Qual a sua preferência de saída?</label>
    <select id="preferencia" onchange="calcularRota()">
        <option value="elevador" selected>Elevador</option>
        <option value="rolante">Escada Rolante</option>
        <option value="fixa">Escada Fixa</option>
    </select>

    <label for="origem">Onde você vai embarcar?</label>
    <select id="origem" onchange="calcularRota()">
        <option value="0" disabled selected>Selecione a origem</option>
    </select>

    <label for="destino">Onde você vai descer?</label>
    <select id="destino" onchange="calcularRota()">
        <option value="0" disabled selected>Selecione o destino</option>
    </select>

    <div class="result-box" id="resultado-box">
        <div class="info-text">Selecione as estações para ver a porta de embarque.</div>
    </div>
</div>

<script>
    // Base de dados com elevadores, escadas rolantes e escadas fixas
    const estacoes = {
        1: { nome: "Corinthians-Itaquera", elevadorBF: "Porta 11", elevadorIT: "-", rolanteBF: "Porta 21", rolanteIT: "-", fixaBF: "Porta 31", fixaIT: "-" },
        2: { nome: "Artur Alvim", elevadorBF: "Porta 65", elevadorIT: "Porta 64", rolanteBF: "Porta 47", rolanteIT: "Porta 43", fixaBF: "Porta 25", fixaIT: "Porta 24" },
        3: { nome: "Patriarca", elevadorBF: "Porta 18", elevadorIT: "Porta 11", rolanteBF: "Porta 35", rolanteIT: "Porta 34", fixaBF: "Porta 45", fixaIT: "Porta 44" },
        4: { nome: "Guilhermina-Esperança", elevadorBF: "Porta 17", elevadorIT: "Porta 12", rolanteBF: "Porta 36", rolanteIT: "Porta 33", fixaBF: "Porta 58", fixaIT: "Porta 51" },
        5: { nome: "Vila Matilde", elevadorBF: "Porta 66", elevadorIT: "Porta 64", rolanteBF: "Porta 47", rolanteIT: "Porta 42", fixaBF: "Porta 25", fixaIT: "Porta 24" },
        6: { nome: "Penha", elevadorBF: "Porta 18", elevadorIT: "Porta 11", rolanteBF: "Porta 36", rolanteIT: "Porta 33", fixaBF: "Porta 47", fixaIT: "Porta 42" },
        7: { nome: "Carrão", elevadorBF: "Porta 18", elevadorIT: "Porta 11", rolanteBF: "Porta 36", rolanteIT: "Porta 33", fixaBF: "Porta 58", fixaIT: "Porta 51" },
        8: { nome: "Tatuapé", elevadorBF: "Porta 66", elevadorIT: "Porta 63", rolanteBF: "Porta 35", rolanteIT: "Porta 34", fixaBF: "Porta 45", fixaIT: "Porta 44" },
        9: { nome: "Belém", elevadorBF: "Porta 65", elevadorIT: "Porta 63", rolanteBF: "Porta 47", rolanteIT: "Porta 42", fixaBF: "Porta 37", fixaIT: "Porta 32" },
        10: { nome: "Bresser-Mooca", elevadorBF: "Porta 65", elevadorIT: "Porta 63", rolanteBF: "Porta 47", rolanteIT: "Porta 42", fixaBF: "Porta 37", fixaIT: "Porta 32" },
        11: { nome: "Brás", elevadorBF: "Vagão 5, Porta 3", elevadorIT: "Vagão 2, Porta 2", rolanteBF: "Vagão 6, Porta 3", rolanteIT: "Vagão 1, Porta 2", fixaBF: "Vagão 4, Porta 1", fixaIT: "Vagão 3, Porta 4" },
        12: { nome: "Pedro II", elevadorBF: "Porta 32", elevadorIT: "Pendente", rolanteBF: "Porta 14", rolanteIT: "Pendente", fixaBF: "Porta 61", fixaIT: "Pendente" },
        13: { nome: "Sé", elevadorBF: "Porta 25", elevadorIT: "Porta 33", rolanteBF: "Porta 57", rolanteIT: "Porta 52", fixaBF: "Porta 57", fixaIT: "Porta 52" },
        14: { nome: "Anhangabaú", elevadorBF: "Vagão 6, Porta 4", elevadorIT: "Vagão 1, Porta 1", rolanteBF: "Vagão 1, Porta 1", rolanteIT: "Vagão 6, Porta 6", fixaBF: "Vagão 1, Porta 1", fixaIT: "Vagão 6, Porta 6" },
        15: { nome: "República", elevadorBF: "Vagão 1, Porta 1", elevadorIT: "Vagão 6, Porta 4", rolanteBF: "Vagão 6, Porta 1", rolanteIT: "Vagão 1, Porta 4", fixaBF: "Vagão 6, Porta 4", fixaIT: "Vagão 1, Porta 1" },
        16: { nome: "Santa Cecília", elevadorBF: "Porta 44", elevadorIT: "Pendente", rolanteBF: "Sem rolante mapeada", rolanteIT: "Pendente", fixaBF: "Porta 33", fixaIT: "Pendente" },
        17: { nome: "Marechal Deodoro", elevadorBF: "Porta 37", elevadorIT: "Porta 37", rolanteBF: "Porta 36", rolanteIT: "Porta 36", fixaBF: "Porta 36", fixaIT: "Porta 36" },
        18: { nome: "Barra Funda", elevadorBF: "-", elevadorIT: "Porta 44", rolanteBF: "-", rolanteIT: "Porta 34", fixaBF: "-", fixaIT: "Porta 61" }
    };

    const selectOrigem = document.getElementById('origem');
    const selectDestino = document.getElementById('destino');
    const selectPreferencia = document.getElementById('preferencia');

    for (let id = 1; id <= 18; id++) {
        let optOrigem = document.createElement('option');
        optOrigem.value = id;
        optOrigem.text = estacoes[id].nome;
        selectOrigem.appendChild(optOrigem);

        let optDestino = document.createElement('option');
        optDestino.value = id;
        optDestino.text = estacoes[id].nome;
        selectDestino.appendChild(optDestino);
    }

    function calcularRota() {
        const idOrigem = parseInt(selectOrigem.value);
        const idDestino = parseInt(selectDestino.value);
        const preferencia = selectPreferencia.value;
        const box = document.getElementById('resultado-box');

        if (!idOrigem || !idDestino) return;

        if (idOrigem === idDestino) {
            box.innerHTML = `<div class="info-text">Origem e destino são a mesma estação.</div>`;
            return;
        }

        let sentido = "";
        let portaAlvo = "";

        if (idOrigem < idDestino) {
            sentido = "Barra Funda";
            if (preferencia === "elevador") portaAlvo = estacoes[idDestino].elevadorBF;
            else if (preferencia === "rolante") portaAlvo = estacoes[idDestino].rolanteBF;
            else portaAlvo = estacoes[idDestino].fixaBF;
        } else {
            sentido = "Itaquera";
            if (preferencia === "elevador") portaAlvo = estacoes[idDestino].elevadorIT;
            else if (preferencia === "rolante") portaAlvo = estacoes[idDestino].rolanteIT;
            else portaAlvo = estacoes[idDestino].fixaIT;
        }

        if (portaAlvo.includes("Pendente") || portaAlvo.includes("Sem rolante")) {
            box.innerHTML = `
                <div class="info-text">Sentido: ${sentido}</div>
                <div class="result-door" style="font-size: 1.2rem; color: #FFB74D;">${portaAlvo}</div>
                <div class="info-text">Você pode atualizar esse dado no código assim que mapear.</div>
            `;
            return;
        }

        let tipoSaidaTexto = "";
        if (preferencia === 'elevador') tipoSaidaTexto = 'porta do elevador';
        else if (preferencia === 'rolante') tipoSaidaTexto = 'escada rolante';
        else tipoSaidaTexto = 'escada fixa';

        box.innerHTML = `
            <div class="info-text">Na estação <b>${estacoes[idOrigem].nome}</b>,<br>embarque exatamente na:</div>
            <div class="result-door">${portaAlvo}</div>
            <div class="info-text">Você sairá de frente para a ${tipoSaidaTexto} em <b>${estacoes[idDestino].nome}</b>.</div>
            ${portaAlvo.includes("Vagão") ? '<div class="alert">*Estação sem portas na plataforma. Baseie-se no número do vagão.</div>' : ''}
        `;
    }
</script>

</body>
</html>
